# Generated by slsa-autotools
# {{GENERATOR_URL}} @ {{GENERATOR_SHA}}
#
# Reproducible release workflow.
#
# Triggered by pushing a tag matching v*. Produces tarballs that
# anyone can rebuild from the tagged commit and byte-compare. Signs
# them two ways (SLSA build provenance + detached cosign bundle).
# Publishes as a DRAFT release — the maintainer then downloads the
# artifacts locally, signs each with their GPG key, uploads the
# resulting .asc files, and flips the draft to published.
#
# Job graph:
#
#   test
#     ├─ build_source_pass1   ─┐
#     ├─ build_source_pass2   ─┤  → verify_source   ─┐
#     ├─ build_windows_pass1  ─┐                     ├─→ publish
#     └─ build_windows_pass2  ─┘  → verify_windows  ─┘
#
#   1. test          — run the project's test suite; release is
#                      blocked if tests fail.
#   2. build_*_pass{1,2} — each pass runs in its own container at
#                      an identical absolute pwd. Anything that
#                      bakes the build path into output (libtool
#                      .la, pkgconfig .pc, debug info) bakes the
#                      same path in both passes by construction,
#                      so the bit-compare in the verify job holds
#                      without per-target DESTDIR workarounds.
#                      Pass jobs are read-only — no signing.
#   3. verify_*      — download both passes, file-set match,
#                      bit-compare every artifact, then SLSA
#                      attest + cosign sign pass1's bytes (same
#                      bytes as pass2 by definition). build_windows
#                      and verify_windows are skipped on projects
#                      with no Windows entry point.
#   4. publish       — download verified artifacts, regenerate
#                      SHA256SUMS, create the draft release.
#
# Why draft + manual GPG?  In the traditional autotools release
# flow, the maintainer builds and signs on the same laptop — one
# compromised machine forges everything. Moving the build into CI
# with SLSA + cosign gives anyone a way to verify the bytes without
# trusting the maintainer at all. The GPG signature then does a
# different, narrower job: it attests that the maintainer
# personally approved this specific release. Integrity is handled
# by attestations; approval is handled by GPG. Different trust
# surfaces, stacked.
#
# Verifying a published release (after the maintainer signs and
# publishes):
#
#   # SLSA provenance — tarball came from this workflow at the
#   # tagged commit.
#   gh attestation verify <pkg>.tar.gz \
#       --repo <owner>/<repo> \
#       --signer-workflow <owner>/<repo>/.github/workflows/release.yml
#
#   # cosign detached signature — same sigstore trust chain, works
#   # without gh.
#   cosign verify-blob \
#       --bundle <pkg>.tar.gz.sigstore --new-bundle-format \
#       --certificate-identity \
#         'https://github.com/<owner>/<repo>/.github/workflows/release.yml@refs/tags/<tag>' \
#       --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#       <pkg>.tar.gz
#
#   # maintainer GPG signature — attests approval, not bytes.
#   gpg --verify <pkg>.tar.gz.asc <pkg>.tar.gz

name: Release

on:
  push:
    # Accept both prefixed (v1.2.3) and bare-semver (1.2.3) tag
    # conventions — adopters keep whatever scheme their upstream
    # already uses. VERSION derivation below strips a leading 'v'
    # if present, so both shapes produce a clean semver string.
    tags:
      - 'v*'
      - '[0-9]*'

permissions: {}

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    permissions:
      contents: read
    # Propagate Windows + Linux binary detection as job outputs so the
    # build_*_pass jobs can gate on them. hashFiles() is only valid in
    # step-level if:, not job-level if:, so detection happens in steps
    # below and is exposed here.
    outputs:
      has_windows: ${{ steps.windows.outputs.has_windows }}
      has_linux:   ${{ steps.linux.outputs.has_linux }}
    steps:
      - name: Mark workspace safe for git (pre-checkout)
        shell: sh
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect Windows build entry point
        # Same precedence as scan.yml. Result is emitted as a job
        # output the build_windows_pass{1,2} jobs read via needs.test.outputs.
        id: windows
        run: |
          set -eu
          if [ -x .slsa-autotools/windows-hook.sh ] \
              || [ -f .slsa-autotools/windows-hook.sh ] \
              || [ -f windows/build.bash ]; then
            echo "has_windows=true"  >> "$GITHUB_OUTPUT"
            echo "Windows build entry point detected."
          else
            echo "has_windows=false" >> "$GITHUB_OUTPUT"
            echo "No Windows build entry point detected."
          fi

      - name: Detect Linux binary build entry point
        # Hook-only — no convention path, same as scan.yml.
        # build_appimage_pass{1,2} read this via needs.test.outputs.
        id: linux
        run: |
          set -eu
          if [ -x .slsa-autotools/linux-hook.sh ] \
              || [ -f .slsa-autotools/linux-hook.sh ]; then
            echo "has_linux=true"  >> "$GITHUB_OUTPUT"
            echo "Linux binary build entry point detected."
          else
            echo "has_linux=false" >> "$GITHUB_OUTPUT"
            echo "No Linux binary build entry point detected."
          fi

      - name: Bootstrap autotools
        run: |
          set -euo pipefail
          # Bootstrap precedence: project hook > autogen.sh >
          # bootstrap > bare autoreconf. The || form runs autoreconf
          # only when autogen / bootstrap exited non-zero — covers
          # libpng (autogen mode=configure refuses, exits 1) and
          # libsodium (autogen exits with getopt usage). Running
          # autoreconf redundantly after a successful autogen breaks
          # the GnuPG family because automake --add-missing --copy
          # overwrites the project's vendored po/Makefile.in.in with
          # automake's bundled (older) version, mismatching the
          # project's own m4 macros. The bare-configure.ac branch
          # always autoreconfs since there's no autogen to handle
          # the regeneration. Matches scan.yml's BUILD_CMD — both
          # flows produce the same bootstrap output, and scan's
          # pinned toolchain reflects what release actually runs.
          if [ -x .slsa-autotools/build-hook.sh ]; then
            ./.slsa-autotools/build-hook.sh
          elif [ -x autogen.sh ]; then
            ./autogen.sh || autoreconf -fi
          elif [ -x bootstrap ]; then
            ./bootstrap || autoreconf -fi
          elif [ -f configure.ac ] || [ -f configure.in ]; then
            autoreconf -fi
          fi
          [ -x ./configure ] || { echo "ERROR: no ./configure after bootstrap"; exit 1; }

      - name: Configure, build, and test
        # Projects with non-standard test invocations can override
        # with .slsa-autotools/test-hook.sh. Default is the
        # autotools-canonical `make check`.
        env:
          # coreutils' configure refuses to run as root unless this is
          # set. Container jobs run as root. Other projects ignore the
          # variable; zero-cost universal.
          FORCE_UNSAFE_CONFIGURE: '1'
        run: |
          set -euo pipefail
          ./configure --quiet --enable-maintainer-mode
          make -s
          if [ -x .slsa-autotools/test-hook.sh ]; then
            ./.slsa-autotools/test-hook.sh
          else
            make -s check
          fi

  # Source build is split into two parallel pass jobs that each run
  # in their own container. Both passes use an identical absolute
  # pwd (${GITHUB_WORKSPACE}/build/${DISTDIR}) by construction, so
  # anything that bakes the build path into output (libtool .la,
  # pkgconfig .pc, generated headers) bakes the same path in both
  # passes. The bit-compare in verify_source then holds without per-
  # target DESTDIR workarounds. See DESIGN.md "Pending refactor:
  # per-pass container isolation" for the full rationale.
  build_source_pass1:
    name: Build source tarball (pass 1)
    needs: test
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Mark workspace safe for git (pre-checkout)
        shell: sh
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need history so we can read the tag commit's timestamp
          # for SOURCE_DATE_EPOCH.
          fetch-depth: 0
          persist-credentials: false

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"
          echo "Version: ${VERSION}"
          echo "SDE:     ${SDE}"

      - name: Bootstrap autotools
        run: |
          set -euo pipefail
          # Bootstrap precedence: project hook > autogen.sh >
          # bootstrap > bare autoreconf. The || form runs autoreconf
          # only when autogen / bootstrap exited non-zero — covers
          # libpng (autogen mode=configure refuses, exits 1) and
          # libsodium (autogen exits with getopt usage). Running
          # autoreconf redundantly after a successful autogen breaks
          # the GnuPG family because automake --add-missing --copy
          # overwrites the project's vendored po/Makefile.in.in with
          # automake's bundled (older) version, mismatching the
          # project's own m4 macros. The bare-configure.ac branch
          # always autoreconfs since there's no autogen to handle
          # the regeneration. Matches scan.yml's BUILD_CMD — both
          # flows produce the same bootstrap output, and scan's
          # pinned toolchain reflects what release actually runs.
          if [ -x .slsa-autotools/build-hook.sh ]; then
            ./.slsa-autotools/build-hook.sh
          elif [ -x autogen.sh ]; then
            ./autogen.sh || autoreconf -fi
          elif [ -x bootstrap ]; then
            ./bootstrap || autoreconf -fi
          elif [ -f configure.ac ] || [ -f configure.in ]; then
            autoreconf -fi
          fi
          [ -x ./configure ] || { echo "ERROR: no ./configure after bootstrap"; exit 1; }

      - name: Build source tarball
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
          # coreutils' configure refuses to run as root unless this is
          # set. Container jobs run as root. Other projects ignore the
          # variable; zero-cost universal.
          FORCE_UNSAFE_CONFIGURE: '1'
        run: |
          set -euo pipefail
          mkdir build
          cd build
          ../configure --quiet --enable-maintainer-mode
          make -s distdir GITLOG_TO_CHANGELOG=true
          # Find the distdir by reading PACKAGE and VERSION from
          # the generated Makefile (automake emits these as make
          # variables). The earlier ls-based heuristic picked the
          # first directory alphabetically, which on most projects
          # is lib/ or similar from configure — not the distdir.
          PACKAGE=$(awk -F' *= *' '$1 == "PACKAGE" {print $2; exit}' Makefile)
          VERSION=$(awk -F' *= *' '$1 == "VERSION" {print $2; exit}' Makefile)
          DISTDIR="${PACKAGE}-${VERSION}"
          [ -n "${PACKAGE}" ] && [ -n "${VERSION}" ] && [ -d "${DISTDIR}" ] \
            || { echo "ERROR: could not locate distdir (PACKAGE=${PACKAGE:-unset} VERSION=${VERSION:-unset})"; ls -la; exit 1; }
          # POT-Creation-Date normalization. xgettext stamps
          # wall-clock time into this field; po4a propagates the
          # stamp into every translation file. Harmless no-op if
          # the project has no po/.
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "${DISTDIR}" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} + 2>/dev/null || true
          # Snapshot expected manifest for the per-pass liar-detector.
          ( cd "${DISTDIR}" && find . -mindepth 1 | sed 's,^\./,,' ) \
              | LC_ALL=C sort > expected.txt
          tar --format=ustar -cf "${DISTDIR}.tar" "${DISTDIR}"
          mkdir -p ../dist
          gzip -c --no-name --best "${DISTDIR}.tar" > "../dist/${DISTDIR}.tar.gz"
          if command -v xz >/dev/null 2>&1; then
            xz -c --threads=1 "${DISTDIR}.tar" > "../dist/${DISTDIR}.tar.xz"
          fi
          # .tar.bz2 if the project declares dist-bzip2 in automake
          # options (matches upstream emission for projects like
          # libsodium that ship .bz2 alongside .gz in their releases).
          if grep -qE '(^|[[:space:]])dist-bzip2([[:space:]]|\]|$)' configure.ac Makefile.am 2>/dev/null \
             && command -v bzip2 >/dev/null 2>&1; then
            bzip2 -c --best < "${DISTDIR}.tar" > "../dist/${DISTDIR}.tar.bz2"
          fi
          rm -f "${DISTDIR}.tar"
          ( cd ../dist \
            && gunzip -c "${DISTDIR}.tar.gz" \
             | tar -tf - \
             | sed "s,^${DISTDIR}/,,;s,/$,," \
             | grep -v '^$' \
             | LC_ALL=C sort ) > actual.txt
          # Per-pass liar-detector: size floor + manifest match. Each
          # pass validates itself before upload; verify_source then
          # only has to do the cross-pass bit-compare.
          MIN_SIZE=32768    # 32 KiB. Deliberately low; many real
                            # autotools projects produce small
                            # tarballs at 0.x versions. Maintainers
                            # can tune this by hand-editing.
          TB="../dist/${DISTDIR}.tar.gz"
          SIZE=$(wc -c < "${TB}")
          if [ "${SIZE}" -lt "${MIN_SIZE}" ]; then
            echo "FAIL: tarball suspiciously small: ${SIZE} < ${MIN_SIZE}"
            exit 1
          fi
          if ! diff -u expected.txt actual.txt > /tmp/manifest.diff; then
            echo "FAIL: tarball manifest does not match distdir declaration:"
            cat /tmp/manifest.diff
            exit 1
          fi
          echo "OK: ${SIZE} bytes, $(wc -l < actual.txt) entries, manifest matches"

      - name: Upload pass 1 tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-pass1
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build_source_pass2:
    # Byte-identical mirror of build_source_pass1. The two jobs run
    # in parallel on independent runners with the same container
    # image; identical absolute pwd between passes is what makes the
    # bit-compare in verify_source robust against absolute-path
    # leakage. If you change anything in the body here, change it in
    # build_source_pass1 too.
    name: Build source tarball (pass 2)
    needs: test
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Mark workspace safe for git (pre-checkout)
        shell: sh
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"
          echo "Version: ${VERSION}"
          echo "SDE:     ${SDE}"

      - name: Bootstrap autotools
        run: |
          set -euo pipefail
          # Bootstrap precedence: project hook > autogen.sh >
          # bootstrap > bare autoreconf. The || form runs autoreconf
          # only when autogen / bootstrap exited non-zero — covers
          # libpng (autogen mode=configure refuses, exits 1) and
          # libsodium (autogen exits with getopt usage). Running
          # autoreconf redundantly after a successful autogen breaks
          # the GnuPG family because automake --add-missing --copy
          # overwrites the project's vendored po/Makefile.in.in with
          # automake's bundled (older) version, mismatching the
          # project's own m4 macros. The bare-configure.ac branch
          # always autoreconfs since there's no autogen to handle
          # the regeneration. Matches scan.yml's BUILD_CMD — both
          # flows produce the same bootstrap output, and scan's
          # pinned toolchain reflects what release actually runs.
          if [ -x .slsa-autotools/build-hook.sh ]; then
            ./.slsa-autotools/build-hook.sh
          elif [ -x autogen.sh ]; then
            ./autogen.sh || autoreconf -fi
          elif [ -x bootstrap ]; then
            ./bootstrap || autoreconf -fi
          elif [ -f configure.ac ] || [ -f configure.in ]; then
            autoreconf -fi
          fi
          [ -x ./configure ] || { echo "ERROR: no ./configure after bootstrap"; exit 1; }

      - name: Build source tarball
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
          # coreutils' configure refuses to run as root unless this is
          # set. Container jobs run as root. Other projects ignore the
          # variable; zero-cost universal.
          FORCE_UNSAFE_CONFIGURE: '1'
        run: |
          set -euo pipefail
          mkdir build
          cd build
          ../configure --quiet --enable-maintainer-mode
          make -s distdir GITLOG_TO_CHANGELOG=true
          PACKAGE=$(awk -F' *= *' '$1 == "PACKAGE" {print $2; exit}' Makefile)
          VERSION=$(awk -F' *= *' '$1 == "VERSION" {print $2; exit}' Makefile)
          DISTDIR="${PACKAGE}-${VERSION}"
          [ -n "${PACKAGE}" ] && [ -n "${VERSION}" ] && [ -d "${DISTDIR}" ] \
            || { echo "ERROR: could not locate distdir (PACKAGE=${PACKAGE:-unset} VERSION=${VERSION:-unset})"; ls -la; exit 1; }
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "${DISTDIR}" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} + 2>/dev/null || true
          ( cd "${DISTDIR}" && find . -mindepth 1 | sed 's,^\./,,' ) \
              | LC_ALL=C sort > expected.txt
          tar --format=ustar -cf "${DISTDIR}.tar" "${DISTDIR}"
          mkdir -p ../dist
          gzip -c --no-name --best "${DISTDIR}.tar" > "../dist/${DISTDIR}.tar.gz"
          if command -v xz >/dev/null 2>&1; then
            xz -c --threads=1 "${DISTDIR}.tar" > "../dist/${DISTDIR}.tar.xz"
          fi
          if grep -qE '(^|[[:space:]])dist-bzip2([[:space:]]|\]|$)' configure.ac Makefile.am 2>/dev/null \
             && command -v bzip2 >/dev/null 2>&1; then
            bzip2 -c --best < "${DISTDIR}.tar" > "../dist/${DISTDIR}.tar.bz2"
          fi
          rm -f "${DISTDIR}.tar"
          ( cd ../dist \
            && gunzip -c "${DISTDIR}.tar.gz" \
             | tar -tf - \
             | sed "s,^${DISTDIR}/,,;s,/$,," \
             | grep -v '^$' \
             | LC_ALL=C sort ) > actual.txt
          MIN_SIZE=32768
          TB="../dist/${DISTDIR}.tar.gz"
          SIZE=$(wc -c < "${TB}")
          if [ "${SIZE}" -lt "${MIN_SIZE}" ]; then
            echo "FAIL: tarball suspiciously small: ${SIZE} < ${MIN_SIZE}"
            exit 1
          fi
          if ! diff -u expected.txt actual.txt > /tmp/manifest.diff; then
            echo "FAIL: tarball manifest does not match distdir declaration:"
            cat /tmp/manifest.diff
            exit 1
          fi
          echo "OK: ${SIZE} bytes, $(wc -l < actual.txt) entries, manifest matches"

      - name: Upload pass 2 tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-pass2
          path: dist/
          if-no-files-found: error
          retention-days: 1

  verify_source:
    name: Verify source reproducibility, attest, sign
    needs: [build_source_pass1, build_source_pass2]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 15
    permissions:
      contents: read
      # Publish the SLSA attestation (out-of-band from artifacts).
      attestations: write
      # Mint the short-lived OIDC token for keyless sigstore signing.
      id-token: write

    steps:
      - name: Download pass 1 tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-pass1
          path: pass1

      - name: Download pass 2 tarballs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-pass2
          path: pass2

      - name: Verify reproducibility
        run: |
          set -eu
          # File-set check first — bit-compare loops over pass1, so
          # an extra/missing file in pass2 would otherwise slip past.
          (cd pass1 && ls -1 | LC_ALL=C sort) > pass1.list
          (cd pass2 && ls -1 | LC_ALL=C sort) > pass2.list
          if ! diff -u pass1.list pass2.list; then
            echo "FAIL: pass1 and pass2 emitted different file sets"
            exit 1
          fi
          sha256sum pass1/* pass2/*
          for f in pass1/*; do
            base=$(basename "$f")
            diff -q "pass1/${base}" "pass2/${base}"
          done
          echo "Reproducibility verified."

      - name: Diagnose source tarball differences
        if: ${{ failure() }}
        run: |
          set -u
          mkdir -p diag
          echo "=== sha256 ==="
          sha256sum pass1/* pass2/* || true
          echo
          for f in pass1/*.tar.gz; do
            base=$(basename "$f")
            stem="${base%.tar.gz}"
            echo "=== ${stem} inner .tar sha256 ==="
            gunzip -c "pass1/${base}" > "diag/${stem}.pass1.tar" || true
            gunzip -c "pass2/${base}" > "diag/${stem}.pass2.tar" || true
            sha256sum "diag/${stem}.pass1.tar" "diag/${stem}.pass2.tar" || true
            echo "=== first differing byte ==="
            cmp "diag/${stem}.pass1.tar" "diag/${stem}.pass2.tar" || true
            echo "=== tar listing diff ==="
            tar tvf "diag/${stem}.pass1.tar" > "diag/${stem}.p1.list" || true
            tar tvf "diag/${stem}.pass2.tar" > "diag/${stem}.p2.list" || true
            diff -u "diag/${stem}.p1.list" "diag/${stem}.p2.list" | head -200 || true
          done

      - name: Assemble release artifacts
        # Sign pass1's bytes — they're identical to pass2's per the
        # bit-compare above, so the choice is arbitrary.
        run: |
          set -eu
          mkdir -p release
          cp pass1/*.tar.* release/
          cd release
          sha256sum *.tar.* > SHA256SUMS
          cat SHA256SUMS

      - name: SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release/*.tar.*

      - name: Install cosign
        # Neither cosign nor curl is in the scan-derived builder
        # image — the strace trace only covers `make dist`, which
        # never invokes them. We pull curl from the same pinned
        # apt snapshot the Dockerfile uses (sources.list is already
        # set to snapshot.ubuntu.com in the image), then download
        # cosign from its GitHub release with SHA256 verification.
        # Same cosign version and digest as build-container.yml so
        # the signing tool is pinned consistently across the
        # pipeline.
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends curl ca-certificates
          COSIGN_VERSION=v3.0.6
          COSIGN_SHA256=c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          echo "${COSIGN_SHA256}  /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign
          cosign version --json | head -3

      - name: Sign each artifact with cosign
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          for f in release/*.tar.*; do
            [ -f "${f}" ] || continue
            case "${f}" in *.sigstore) continue ;; esac
            cosign sign-blob --bundle "${f}.sigstore" --new-bundle-format "${f}"
          done
          ls -la release/

      - name: Upload source artifacts for publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-artifacts
          path: release/
          if-no-files-found: error
          retention-days: 1

  # Windows path is split symmetrically with the source path: two
  # parallel pass jobs in their own containers, then verify_windows
  # does the bit-compare + attest + sign. Identical pwd between
  # passes is what makes the bit-compare hold here — libsodium's
  # windows hook configures with --prefix="$(pwd)/libsodium-win64",
  # which used to bake a different absolute path into libsodium.pc
  # in each sibling build dir; with both passes at the same pwd
  # inside their own container the leak resolves to the same
  # bytes by construction.
  #
  # Runtime-gated via a job output from `test` rather than
  # hashFiles() — hashFiles is only valid in step-level if:, not
  # job-level. Detection happens once in the test job's
  # "Detect Windows build entry point" step and propagates here.
  # Detection precedence (same as scan.yml):
  #   - .slsa-autotools/windows-hook.sh   (hook, takes precedence)
  #   - windows/build.bash                (xz convention)
  # Consequence for repos without a Windows path: build_windows_*
  # show as "Skipped" in the UI. Cosmetic; publish is gated so a
  # skip doesn't block the release.
  build_windows_pass1:
    name: Build Windows binaries (pass 1)
    needs: test
    if: needs.test.outputs.has_windows == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Mark workspace safe for git (pre-checkout)
        shell: sh
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"

      - name: Bootstrap autotools
        run: |
          set -euo pipefail
          # Bootstrap precedence: project hook > autogen.sh >
          # bootstrap > bare autoreconf. The || form runs autoreconf
          # only when autogen / bootstrap exited non-zero — covers
          # libpng (autogen mode=configure refuses, exits 1) and
          # libsodium (autogen exits with getopt usage). Running
          # autoreconf redundantly after a successful autogen breaks
          # the GnuPG family because automake --add-missing --copy
          # overwrites the project's vendored po/Makefile.in.in with
          # automake's bundled (older) version, mismatching the
          # project's own m4 macros. The bare-configure.ac branch
          # always autoreconfs since there's no autogen to handle
          # the regeneration. Matches scan.yml's BUILD_CMD — both
          # flows produce the same bootstrap output, and scan's
          # pinned toolchain reflects what release actually runs.
          if [ -x .slsa-autotools/build-hook.sh ]; then
            ./.slsa-autotools/build-hook.sh
          elif [ -x autogen.sh ]; then
            ./autogen.sh || autoreconf -fi
          elif [ -x bootstrap ]; then
            ./bootstrap || autoreconf -fi
          elif [ -f configure.ac ] || [ -f configure.in ]; then
            autoreconf -fi
          fi
          [ -x ./configure ] || { echo "ERROR: no ./configure after bootstrap"; exit 1; }

      - name: Detect Windows build entry point
        id: windows
        run: |
          set -eu
          # Same precedence as scan.yml: executable hook > plain hook >
          # windows/build.bash convention. windows/build.bash is not
          # +x in upstream xz and never chmod'd locally.
          #
          # Emit ABSOLUTE paths. The build steps below run the command
          # from inside the distdir (make distdir output), and distdir
          # only contains files declared in Makefile.am — so a
          # user-added .slsa-autotools/windows-hook.sh won't be present
          # under the distdir CWD. Referencing the hook via
          # ${GITHUB_WORKSPACE}/... resolves against the original
          # checkout regardless of CWD. Relative invocations inside
          # the hook (e.g. dist-build/msys2-*.sh) still resolve
          # against distdir CWD.
          if [ -x .slsa-autotools/windows-hook.sh ]; then
            echo "cmd=${GITHUB_WORKSPACE}/.slsa-autotools/windows-hook.sh" >> "$GITHUB_OUTPUT"
          elif [ -f .slsa-autotools/windows-hook.sh ]; then
            echo "cmd=bash ${GITHUB_WORKSPACE}/.slsa-autotools/windows-hook.sh" >> "$GITHUB_OUTPUT"
          elif [ -f windows/build.bash ]; then
            echo "cmd=bash ${GITHUB_WORKSPACE}/windows/build.bash" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: Windows job reached without an entry point; needs.test.outputs.has_windows gate disagrees with detection?"
            exit 1
          fi

      - name: Install reproducibility wrappers
        # Universal for any mingw-based Windows build: the build
        # script itself stays unmodified upstream.
        #   (A) ${TRIPLET}-gcc wrapper injects -ffile-prefix-map so
        #       debug paths are stable, and -Wl,--no-insert-timestamp
        #       + --build-id=none so the PE header and build-id
        #       sections don't carry run-to-run entropy.
        #   (B) 7z wrapper clamps mtimes to SOURCE_DATE_EPOCH before
        #       archive create/update, so the zip/7z central directory
        #       records deterministic timestamps.
        # PATH is then prefixed with /opt/wrappers so any invocation
        # of gcc / 7z picks up the wrappers transparently.
        run: |
          set -euo pipefail
          mkdir -p /opt/wrappers
          for TRIPLET in i686-w64-mingw32 x86_64-w64-mingw32; do
            cat > "/opt/wrappers/${TRIPLET}-gcc" <<WRAP
          #!/bin/sh
          exec /usr/bin/${TRIPLET}-gcc \\
            "-ffile-prefix-map=\${DISTDIR_TOP}=." \\
            -Wl,--no-insert-timestamp \\
            -Wl,--build-id=none \\
            "\$@"
          WRAP
            chmod +x "/opt/wrappers/${TRIPLET}-gcc"
          done
          cat > /opt/wrappers/7z <<'WRAP'
          #!/bin/sh
          case "$1" in
            a|u)
              find . -exec touch --no-dereference -h -d "@${SOURCE_DATE_EPOCH}" {} + 2>/dev/null || true
              ;;
          esac
          exec /usr/bin/7z "$@"
          WRAP
          chmod +x /opt/wrappers/7z
          echo "PATH=/opt/wrappers:${PATH}" >> "$GITHUB_ENV"

      - name: Build Windows binaries
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
          # coreutils' configure refuses to run as root unless this is
          # set. Container jobs run as root. Other projects ignore the
          # variable; zero-cost universal.
          FORCE_UNSAFE_CONFIGURE: '1'
        run: |
          set -euo pipefail
          WINDOWS_CMD='${{ steps.windows.outputs.cmd }}'
          mkdir build
          cd build
          ../configure --quiet --enable-maintainer-mode
          make -s distdir GITLOG_TO_CHANGELOG=true
          PACKAGE=$(awk -F' *= *' '$1 == "PACKAGE" {print $2; exit}' Makefile)
          VERSION=$(awk -F' *= *' '$1 == "VERSION" {print $2; exit}' Makefile)
          DISTDIR="${PACKAGE}-${VERSION}"
          [ -n "${PACKAGE}" ] && [ -n "${VERSION}" ] && [ -d "${DISTDIR}" ] \
            || { echo "ERROR: could not locate distdir (PACKAGE=${PACKAGE:-unset} VERSION=${VERSION:-unset})"; ls -la; exit 1; }
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "${DISTDIR}" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} + 2>/dev/null || true
          cd "${DISTDIR}"
          # DISTDIR_TOP is what -ffile-prefix-map rewrites to "." in
          # debug paths — must be exported before the build fires.
          DISTDIR_TOP="$(pwd)"
          export DISTDIR_TOP
          bash -c "${WINDOWS_CMD}"
          # Collect whatever the build produced matching our glob.
          # Projects with different naming conventions can supply a
          # .slsa-autotools/windows-hook.sh that renames outputs into
          # this shape.
          mkdir -p "${GITHUB_WORKSPACE}/win-dist"
          shopt -s nullglob
          copied=0
          for f in *-windows.zip *-windows.7z *-windows.tar.gz *-windows.tar.xz; do
            cp "$f" "${GITHUB_WORKSPACE}/win-dist/"
            copied=$((copied+1))
          done
          if [ "${copied}" -eq 0 ]; then
            echo "ERROR: Windows build produced no *-windows.{zip,7z,tar.gz,tar.xz} artifacts in $(pwd)"
            ls -la
            exit 1
          fi

      - name: Upload pass 1 Windows binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-pass1
          path: win-dist/
          if-no-files-found: error
          retention-days: 1

  build_windows_pass2:
    # Byte-identical mirror of build_windows_pass1. See note on
    # build_source_pass2 — change in pairs.
    name: Build Windows binaries (pass 2)
    needs: test
    if: needs.test.outputs.has_windows == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Mark workspace safe for git (pre-checkout)
        shell: sh
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Derive version and SOURCE_DATE_EPOCH
        id: meta
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_ENV"

      - name: Bootstrap autotools
        run: |
          set -euo pipefail
          # Bootstrap precedence: project hook > autogen.sh >
          # bootstrap > bare autoreconf. The || form runs autoreconf
          # only when autogen / bootstrap exited non-zero — covers
          # libpng (autogen mode=configure refuses, exits 1) and
          # libsodium (autogen exits with getopt usage). Running
          # autoreconf redundantly after a successful autogen breaks
          # the GnuPG family because automake --add-missing --copy
          # overwrites the project's vendored po/Makefile.in.in with
          # automake's bundled (older) version, mismatching the
          # project's own m4 macros. The bare-configure.ac branch
          # always autoreconfs since there's no autogen to handle
          # the regeneration. Matches scan.yml's BUILD_CMD — both
          # flows produce the same bootstrap output, and scan's
          # pinned toolchain reflects what release actually runs.
          if [ -x .slsa-autotools/build-hook.sh ]; then
            ./.slsa-autotools/build-hook.sh
          elif [ -x autogen.sh ]; then
            ./autogen.sh || autoreconf -fi
          elif [ -x bootstrap ]; then
            ./bootstrap || autoreconf -fi
          elif [ -f configure.ac ] || [ -f configure.in ]; then
            autoreconf -fi
          fi
          [ -x ./configure ] || { echo "ERROR: no ./configure after bootstrap"; exit 1; }

      - name: Detect Windows build entry point
        id: windows
        run: |
          set -eu
          if [ -x .slsa-autotools/windows-hook.sh ]; then
            echo "cmd=${GITHUB_WORKSPACE}/.slsa-autotools/windows-hook.sh" >> "$GITHUB_OUTPUT"
          elif [ -f .slsa-autotools/windows-hook.sh ]; then
            echo "cmd=bash ${GITHUB_WORKSPACE}/.slsa-autotools/windows-hook.sh" >> "$GITHUB_OUTPUT"
          elif [ -f windows/build.bash ]; then
            echo "cmd=bash ${GITHUB_WORKSPACE}/windows/build.bash" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: Windows job reached without an entry point; needs.test.outputs.has_windows gate disagrees with detection?"
            exit 1
          fi

      - name: Install reproducibility wrappers
        run: |
          set -euo pipefail
          mkdir -p /opt/wrappers
          for TRIPLET in i686-w64-mingw32 x86_64-w64-mingw32; do
            cat > "/opt/wrappers/${TRIPLET}-gcc" <<WRAP
          #!/bin/sh
          exec /usr/bin/${TRIPLET}-gcc \\
            "-ffile-prefix-map=\${DISTDIR_TOP}=." \\
            -Wl,--no-insert-timestamp \\
            -Wl,--build-id=none \\
            "\$@"
          WRAP
            chmod +x "/opt/wrappers/${TRIPLET}-gcc"
          done
          cat > /opt/wrappers/7z <<'WRAP'
          #!/bin/sh
          case "$1" in
            a|u)
              find . -exec touch --no-dereference -h -d "@${SOURCE_DATE_EPOCH}" {} + 2>/dev/null || true
              ;;
          esac
          exec /usr/bin/7z "$@"
          WRAP
          chmod +x /opt/wrappers/7z
          echo "PATH=/opt/wrappers:${PATH}" >> "$GITHUB_ENV"

      - name: Build Windows binaries
        env:
          TAR_OPTIONS: '--owner=0 --group=0 --numeric-owner --mode=u+rw,go+r-w --sort=name --clamp-mtime --mtime=@${{ steps.meta.outputs.sde }}'
          LC_COLLATE: 'C'
          # coreutils' configure refuses to run as root unless this is
          # set. Container jobs run as root. Other projects ignore the
          # variable; zero-cost universal.
          FORCE_UNSAFE_CONFIGURE: '1'
        run: |
          set -euo pipefail
          WINDOWS_CMD='${{ steps.windows.outputs.cmd }}'
          mkdir build
          cd build
          ../configure --quiet --enable-maintainer-mode
          make -s distdir GITLOG_TO_CHANGELOG=true
          PACKAGE=$(awk -F' *= *' '$1 == "PACKAGE" {print $2; exit}' Makefile)
          VERSION=$(awk -F' *= *' '$1 == "VERSION" {print $2; exit}' Makefile)
          DISTDIR="${PACKAGE}-${VERSION}"
          [ -n "${PACKAGE}" ] && [ -n "${VERSION}" ] && [ -d "${DISTDIR}" ] \
            || { echo "ERROR: could not locate distdir (PACKAGE=${PACKAGE:-unset} VERSION=${VERSION:-unset})"; ls -la; exit 1; }
          FIXED_DATE=$(date -u -d "@${SOURCE_DATE_EPOCH}" "+%Y-%m-%d %H:%M+0000")
          find "${DISTDIR}" -type f \( -name '*.pot' -o -name '*.po' \) \
            -exec sed -i "s|^\"POT-Creation-Date: .*|\"POT-Creation-Date: ${FIXED_DATE}\\\\n\"|" {} + 2>/dev/null || true
          cd "${DISTDIR}"
          DISTDIR_TOP="$(pwd)"
          export DISTDIR_TOP
          bash -c "${WINDOWS_CMD}"
          mkdir -p "${GITHUB_WORKSPACE}/win-dist"
          shopt -s nullglob
          copied=0
          for f in *-windows.zip *-windows.7z *-windows.tar.gz *-windows.tar.xz; do
            cp "$f" "${GITHUB_WORKSPACE}/win-dist/"
            copied=$((copied+1))
          done
          if [ "${copied}" -eq 0 ]; then
            echo "ERROR: Windows build produced no *-windows.{zip,7z,tar.gz,tar.xz} artifacts in $(pwd)"
            ls -la
            exit 1
          fi

      - name: Upload pass 2 Windows binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-pass2
          path: win-dist/
          if-no-files-found: error
          retention-days: 1

  verify_windows:
    name: Verify Windows reproducibility, attest, sign
    needs: [build_windows_pass1, build_windows_pass2]
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}
    defaults:
      run:
        shell: bash
    timeout-minutes: 15
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Download pass 1 Windows binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-pass1
          path: win-pass1

      - name: Download pass 2 Windows binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-pass2
          path: win-pass2

      - name: Verify Windows reproducibility
        run: |
          set -eu
          (cd win-pass1 && ls -1 | LC_ALL=C sort) > pass1.list
          (cd win-pass2 && ls -1 | LC_ALL=C sort) > pass2.list
          if ! diff -u pass1.list pass2.list; then
            echo "FAIL: pass1 and pass2 emitted different file sets"
            exit 1
          fi
          sha256sum win-pass1/* win-pass2/*
          for f in win-pass1/*; do
            base=$(basename "$f")
            diff -q "win-pass1/${base}" "win-pass2/${base}"
          done
          echo "Windows reproducibility verified."

      - name: Diagnose Windows differences
        if: ${{ failure() }}
        run: |
          set -u
          sha256sum win-pass1/* win-pass2/* || true
          for f in win-pass1/*; do
            base=$(basename "$f")
            echo "=== ${base} listing diff ==="
            case "${base}" in
              *.zip|*.7z) 7z l "win-pass1/${base}" > /tmp/p1.list 2>/dev/null || true
                          7z l "win-pass2/${base}" > /tmp/p2.list 2>/dev/null || true ;;
              *.tar.*)    tar tvf "win-pass1/${base}" > /tmp/p1.list 2>/dev/null || true
                          tar tvf "win-pass2/${base}" > /tmp/p2.list 2>/dev/null || true ;;
            esac
            diff -u /tmp/p1.list /tmp/p2.list | head -100 || true
          done

      - name: Size-floor sanity check
        # Generic liar-detector for Windows artifacts. Catches empty
        # or truncated archives before signing. A deeper
        # entry-manifest check (project-specific) is a candidate for
        # a later .slsa-autotools/windows-manifest.txt hook.
        run: |
          set -euo pipefail
          MIN_SIZE=131072   # 128 KiB floor — tune per project
          for f in win-pass1/*; do
            SIZE=$(wc -c < "$f")
            if [ "${SIZE}" -lt "${MIN_SIZE}" ]; then
              echo "FAIL: $(basename "$f") suspiciously small: ${SIZE} < ${MIN_SIZE}"
              exit 1
            fi
            echo "OK: $(basename "$f") ${SIZE} bytes"
          done

      - name: Assemble release artifacts
        # Sign pass1's bytes — they're identical to pass2's per the
        # bit-compare above, so the choice is arbitrary.
        run: |
          set -eu
          mkdir -p release
          cp win-pass1/* release/

      - name: SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/*-windows.zip
            release/*-windows.7z
            release/*-windows.tar.gz
            release/*-windows.tar.xz

      - name: Install cosign
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y --no-install-recommends curl ca-certificates
          COSIGN_VERSION=v3.0.6
          COSIGN_SHA256=c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          echo "${COSIGN_SHA256}  /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign

      - name: Sign Windows artifacts with cosign
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          for f in release/*-windows.*; do
            [ -f "${f}" ] || continue
            case "${f}" in *.sigstore) continue ;; esac
            cosign sign-blob --bundle "${f}.sigstore" --new-bundle-format "${f}"
          done
          ls -la release/

      - name: Upload Windows artifacts for publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-artifacts
          path: release/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Create draft release
    # needs verify_windows too so publish waits for it, but we can't
    # block on it: projects without a Windows path see the windows
    # pass jobs (and therefore verify_windows) as skipped. The if:
    # below permits skipped + success while refusing failed/cancelled.
    needs: [verify_source, verify_windows]
    if: |
      always()
      && needs.verify_source.result == 'success'
      && (needs.verify_windows.result == 'success' || needs.verify_windows.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      # Only job with write access — actually creates the release.
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Derive version
        id: meta
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          SDE=$(git log -1 --format=%ct "${GITHUB_REF_NAME}")
          {
            echo "version=${VERSION}"
            echo "sde=${SDE}"
          } >> "$GITHUB_OUTPUT"

      - name: Download source artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-artifacts
          path: release

      - name: Download Windows artifacts
        if: needs.verify_windows.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-artifacts
          path: release

      - name: Discover distdir name
        id: dist
        run: |
          set -eu
          # Pick the common prefix of release/*.tar.* — that's the
          # distdir name as produced by make distdir (e.g., xz-5.8.3).
          DISTDIR=$(ls release/*.tar.gz | head -1 | xargs basename | sed 's/\.tar\.gz$//')
          echo "distdir=${DISTDIR}" >> "$GITHUB_OUTPUT"
          echo "distdir=${DISTDIR}"

      - name: Regenerate SHA256SUMS over all artifacts
        # The source job writes a SHA256SUMS covering only its own
        # tarballs. Now that windows artifacts (if any) are also
        # in release/, rewrite to cover everything except sigstore
        # bundles and SHA256SUMS itself.
        run: |
          set -euo pipefail
          cd release
          rm -f SHA256SUMS
          ls -1 \
            | grep -v '\.sigstore$' \
            | grep -v '^SHA256SUMS$' \
            | LC_ALL=C sort \
            | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Build release notes
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SDE: ${{ steps.meta.outputs.sde }}
          DISTDIR: ${{ steps.dist.outputs.distdir }}
          # workflow_ref embeds the tag name, which a compromised
          # maintainer could shape to inject shell. Pipe through
          # env so the shell sees a bare variable, not a template
          # expansion (zizmor template-injection audit).
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -eu
          # Enumerate main artifacts = anything in release/ that isn't
          # a sigstore bundle or SHA256SUMS. Covers source tarballs +
          # windows archives (zip/7z/tar.*) uniformly.
          main_artifacts() {
            ls -1 release \
              | grep -v '\.sigstore$' \
              | grep -v '^SHA256SUMS$' \
              | LC_ALL=C sort
          }
          {
            echo "## Release ${VERSION}"
            echo
            echo "Produced by an automated GitHub Actions workflow from the"
            echo "tagged commit. Every artifact is reproducible bit-for-bit"
            echo "and signed by the workflow's OIDC identity."
            echo
            echo "**This release is currently a DRAFT.** The maintainer will"
            echo "manually sign each artifact with their GPG key and attach"
            echo "the resulting \`.asc\` files before publishing."
            echo
            echo "### Build provenance"
            echo
            echo "- **Commit:**              \`${GITHUB_SHA}\`"
            echo "- **Tag:**                 \`${GITHUB_REF_NAME}\`"
            echo "- **SOURCE_DATE_EPOCH:**   \`${SDE}\`"
            echo "- **Builder image:**       \`ghcr.io/${{ github.repository }}/builder@sha256:{{BUILDER_DIGEST}}\`"
            echo "- **Workflow:**            \`${WORKFLOW_REF}\`"
            echo
            echo "### Checksums"
            echo
            echo '```'
            cat release/SHA256SUMS
            echo '```'
            echo
            echo "### Verifying"
            echo
            echo "Each artifact ships with a sigstore bundle (\`*.sigstore\`)"
            echo "and, once the maintainer publishes, a GPG detached"
            echo "signature (\`*.asc\`)."
            echo
            echo "**SLSA provenance (needs the \`gh\` CLI):**"
            echo '```'
            while read -r base; do
              echo "gh attestation verify ${base} \\"
              echo "    --repo ${{ github.repository }} \\"
              echo "    --signer-workflow ${{ github.repository }}/.github/workflows/release.yml"
            done < <(main_artifacts)
            echo '```'
            echo
            echo "**cosign detached signature (works without \`gh\`):**"
            echo '```'
            while read -r base; do
              echo "cosign verify-blob \\"
              echo "    --bundle ${base}.sigstore --new-bundle-format \\"
              echo "    --certificate-identity \\"
              echo "      'https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}' \\"
              echo "    --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
              echo "    ${base}"
            done < <(main_artifacts)
            echo '```'
            echo
            echo "**GPG (after the maintainer publishes):**"
            echo '```'
            while read -r base; do
              echo "gpg --verify ${base}.asc ${base}"
            done < <(main_artifacts)
            echo '```'
          } > release_notes.md

      - name: Create DRAFT release
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Draft so the maintainer can GPG-sign locally before
          # publishing. Prerelease-style tags (alpha/beta/rc/demo/pre)
          # are flagged as prereleases; stable tags are not.
          PRERELEASE=""
          case "${VERSION}" in
            *alpha*|*beta*|*rc*|*demo*|*pre*) PRERELEASE="--prerelease" ;;
          esac
          # Upload everything in release/ — tarballs, windows
          # archives (if any), sigstore bundles, and SHA256SUMS. Each
          # filename is unique so no dedup needed.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --notes-file release_notes.md \
            --draft \
            ${PRERELEASE} \
            release/*

      - name: Maintainer action needed
        run: |
          {
            echo "### Draft release created"
            echo
            echo "Next step: **sign the artifacts with your GPG key and publish.**"
            echo
            echo '```'
            echo "# From a machine with your GPG private key:"
            echo "gh release download ${GITHUB_REF_NAME} -R ${{ github.repository }}"
            echo "for f in *; do"
            echo "  case \"\$f\" in *.sigstore|*.asc|SHA256SUMS) continue ;; esac"
            echo "  [ -f \"\$f\" ] && gpg --detach-sign --armor \"\$f\""
            echo "done"
            echo "gh release upload ${GITHUB_REF_NAME} *.asc -R ${{ github.repository }}"
            echo "gh release edit   ${GITHUB_REF_NAME} --draft=false -R ${{ github.repository }}"
            echo '```'
            echo
            echo "The \`--detach-sign --armor\` flags produce \`.asc\` files"
            echo "that sit alongside the original artifacts. The original"
            echo "bytes are untouched, so existing SLSA and cosign signatures"
            echo "remain valid after publication."
          } >> "$GITHUB_STEP_SUMMARY"
