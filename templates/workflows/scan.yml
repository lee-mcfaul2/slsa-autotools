# Generated by slsa-autotools
# {{GENERATOR_URL}} @ {{GENERATOR_SHA}}
#
# Derives a reproducible Dockerfile for this project by tracing a
# real, successful build and pinning every apt package the build
# actually touched.
#
# How it works:
#   1. Boot a SHA-pinned ubuntu:24.04 container with apt sources
#      redirected to snapshot.ubuntu.com at a pinned timestamp.
#      Every byte that goes into the image is addressable by
#      digest + snapshot URL, indefinitely.
#   2. Install a generous autotools bootstrap toolchain so the
#      project's ./configure and make dist can actually run.
#   3. Run the project's build under `strace -f -e openat,execve`
#      and capture every file path the build opens or executes.
#   4. Map each absolute path to its owning Debian package via
#      `dpkg -S`. The result is the exact set of packages the
#      build depends on — not a guess, not a static parse.
#   5. For each package, look up the version currently installed
#      and the SHA256 of its .deb in the snapshot's Packages
#      index.
#   6. Emit a Dockerfile that downloads those exact .debs from
#      the pinned snapshot and verifies each SHA256 before
#      installing. The result is a human-readable build context
#      where every single apt byte is pinned end-to-end.
#   7. Commit the Dockerfile to this branch if it changed. A
#      subsequent run of build-container.yml (on the main branch,
#      after this PR merges) publishes the image.
#
# Triggers:
#   - on push to any branch when scan.yml itself is modified
#     (first install, or user bumps SNAPSHOT_TS)
#   - workflow_dispatch for on-demand refresh without editing
#
# Project bootstrap hook:
#   If `.slsa-autotools/build-hook.sh` exists in the repo, it is
#   executed in place of the default `./autogen.sh && ./configure
#   && make dist` sequence. Useful for projects with unusual
#   bootstrap requirements (submodule pulls, custom configure
#   flags, etc.). The hook runs with CWD set to the repo root and
#   inherits PATH including all bootstrap tooling.

name: Scan and pin Dockerfile

on:
  push:
    # Branches only — a tag push whose commit happens to touch
    # scan.yml would otherwise fire this workflow in detached HEAD
    # with no branch to push the regenerated Dockerfile back to.
    branches: ['**']
    paths:
      - '.github/workflows/scan.yml'
  workflow_dispatch:
    inputs:
      snapshot_ts:
        description: 'Ubuntu snapshot timestamp (YYYYMMDDTHHMMSSZ)'
        required: false
        default: ''

permissions: {}

jobs:
  # Step 1: pick the Ubuntu base release that satisfies every
  # configure.ac dep declaration. Runs on a bare runner because the
  # scan container itself is the thing being chosen — can't choose
  # your own image from inside it. Outputs feed into the scan job.
  resolve:
    name: Resolve target Ubuntu base from configure.ac
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      release: ${{ steps.pick.outputs.release }}
      image_digest: ${{ steps.digest.outputs.digest }}
      extra_packages: ${{ steps.pick.outputs.extra_packages }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install resolver tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            apt-file devscripts wget dpkg-dev gawk
          sudo apt-file update

      - name: Pick base release from configure.ac
        id: pick
        # Inline resolver. Parses configure.ac for AM_PATH_<NAME>
        # and PKG_CHECK_MODULES, maps each declared dep to its apt
        # -dev package via apt-file, queries rmadison for version
        # availability per Ubuntu release, intersects, picks the
        # newest LTS that satisfies (falling back to newest non-LTS
        # if no LTS works). Emits a structured conflict diagnostic
        # if no release covers all deps.
        #
        # Candidate release set is intentionally hardcoded — adding a
        # new Ubuntu release is a one-line change and guarantees a
        # human reviewed it before scans start picking it.
        #
        # BASE_OVERRIDE: set by init-container when the adopter
        # answered the "specific Ubuntu version?" prompt. When set,
        # dep extraction still runs (the .pc / m4 -> -dev mapping is
        # the same regardless of which release we end up on), but the
        # rmadison-driven intersection is skipped and the adopter's
        # codename is used as-is. Typical reason: AppImage builds
        # need Jammy because linuxdeployqt rejects newer host glibc.
        env:
          BASE_OVERRIDE: '{{BASE_OVERRIDE}}'
        run: |
          set -euo pipefail
          cat > /tmp/pick-base.sh <<'PICK_BASE_EOF'
          #!/bin/bash
          set -euo pipefail
          CONFIGURE_AC="${1:-configure.ac}"
          [ -f "$CONFIGURE_AC" ] || { echo "ERROR: $CONFIGURE_AC not found" >&2; exit 2; }

          # LTS first (newest → oldest), then non-LTS (newest → oldest).
          LTS=(resolute noble jammy focal)
          NONLTS=(questing plucky oracular)
          RELEASE_ORDER=("${LTS[@]}" "${NONLTS[@]}")

          log()  { printf '==> %s\n' "$*" >&2; }
          warn() { printf '!!  %s\n' "$*" >&2; }

          # Build shell-var lookup for NEED_X_VERSION=1.56 patterns.
          declare -A SHELL_VARS=()
          while IFS='=' read -r key val; do
            if [[ "$key" =~ ^[A-Z_][A-Z_0-9]*$ ]] && [[ "$val" =~ ^[0-9.]+$ ]]; then
              SHELL_VARS["$key"]="$val"
            fi
          done < <(grep -E '^[A-Z_][A-Z_0-9]*=[0-9.]+' "$CONFIGURE_AC" 2>/dev/null || true)

          declare -a DEPS=()

          # AM_PATH_<NAME>(version) → m4 file → -dev package
          while IFS= read -r match; do
            lineno=${match%%:*}
            body=${match#*:}
            macro=$(echo "$body" | grep -oE 'AM_PATH_[A-Z_0-9]+' | head -1)
            case "$macro" in
              ""|AM_PATH_PROG|AM_PATH_PROGS) continue ;;
            esac
            arg=$(echo "$body" | sed -E "s/.*${macro}\(\\s*\"?\\\$?\\{?([^\"\\),\\s\\}]+)\\}?\"?.*/\\1/")
            ver=""
            if [[ "$arg" =~ ^[0-9.]+$ ]]; then
              ver="$arg"
            elif [[ "$arg" =~ ^[A-Z_][A-Z_0-9]*$ ]] && [[ -n "${SHELL_VARS[$arg]:-}" ]]; then
              ver="${SHELL_VARS[$arg]}"
            fi
            m4_name=$(echo "${macro#AM_PATH_}" | tr '[:upper:]_' '[:lower:]-').m4
            # || true: pipefail + set -e would abort the whole script
            # if apt-file search returns non-zero on a no-match (which
            # some apt-file versions do silently). Tolerate as empty.
            pkg=$(apt-file search "/usr/share/aclocal/${m4_name}" 2>/dev/null \
              | awk -F: '/-dev:/{print $1; exit}' || true)
            if [ -n "$pkg" ]; then
              DEPS+=("${pkg}|${ver}|${CONFIGURE_AC}:${lineno} ${macro}")
            else
              warn "could not resolve ${macro} → no -dev package ships ${m4_name}"
            fi
          done < <(grep -nE 'AM_PATH_[A-Z_][A-Z_0-9]*' "$CONFIGURE_AC")

          # PKG_CHECK_MODULES(VAR, [name >= ver]) → .pc file → -dev
          while IFS= read -r match; do
            lineno=${match%%:*}
            body=${match#*:}
            # Negated class lists ] first so strict ERE parsers
            # (GNU sed >= 4.9 on Ubuntu 24.04 runners) treat it as a
            # literal class member rather than the class terminator.
            # Older parsers were lenient about the [^,\]) form and
            # silently accepted, so this only surfaced once a project
            # (ImageMagick) had a PKG_CHECK_MODULES with the class
            # boundary actually exercised.
            spec=$(echo "$body" | sed -E 's/.*PKG_CHECK_MODULES\([^,]+,\s*\[?([^],)]+).*/\1/')
            name=$(echo "$spec" | awk '{print $1}')
            ver=$(echo "$spec" | grep -oE '[0-9][0-9.]*' | head -1 || true)
            # || true: pipefail + set -e would abort if apt-file
            # search returns non-zero on a no-match. Tolerate as empty.
            pkg=$(apt-file search "/${name}.pc" 2>/dev/null \
              | awk -F: '/-dev:/{print $1; exit}' || true)
            if [ -n "$pkg" ]; then
              DEPS+=("${pkg}|${ver}|${CONFIGURE_AC}:${lineno} PKG_CHECK_MODULES($name)")
            fi
          done < <(grep -nE 'PKG_CHECK_MODULES' "$CONFIGURE_AC" 2>/dev/null || true)

          # Emit the deduped list of -dev packages to a side file so
          # the YAML wrapper can plumb them as a GITHUB_OUTPUT into
          # the scan job's apt install step. Empty file is fine if
          # there are no deps to install.
          : > /tmp/pick-base-extra-packages.txt
          for d in "${DEPS[@]}"; do
            cut -d'|' -f1 <<<"$d"
          done | sort -u > /tmp/pick-base-extra-packages.txt

          # Adopter override: skip the rmadison-driven intersection
          # and use the codename the adopter declared at init time.
          # Dep extraction above still ran, so extra_packages is
          # populated from configure.ac as usual.
          if [ -n "${BASE_OVERRIDE:-}" ]; then
            log "Using adopter-specified base: ${BASE_OVERRIDE}"
            echo "${BASE_OVERRIDE}"
            exit 0
          fi

          if [ ${#DEPS[@]} -eq 0 ]; then
            log "no dep declarations in $CONFIGURE_AC; defaulting to newest LTS (${LTS[0]})"
            echo "${LTS[0]}"
            exit 0
          fi

          log "extracted ${#DEPS[@]} dep declarations:"
          for d in "${DEPS[@]}"; do log "  $d"; done

          declare -A SATISFY=()
          for dep in "${DEPS[@]}"; do
            pkg=$(cut -d'|' -f1 <<<"$dep")
            min_ver=$(cut -d'|' -f2 <<<"$dep")
            while IFS= read -r line; do
              release=$(awk -F'|' '{gsub(/ /,"",$3); print $3}' <<<"$line")
              version=$(awk -F'|' '{gsub(/ /,"",$2); print $2}' <<<"$line")
              release=${release%%/*}
              case "$release" in *-*) continue ;; esac
              in_candidate=false
              for r in "${RELEASE_ORDER[@]}"; do
                [ "$r" = "$release" ] && { in_candidate=true; break; }
              done
              [ "$in_candidate" = true ] || continue
              clean=$(sed -E 's/-.*//' <<<"$version")
              if [ -z "$min_ver" ] || dpkg --compare-versions "$clean" ge "$min_ver"; then
                SATISFY["$pkg"]+=" $release"
              fi
            done < <(rmadison -u ubuntu "$pkg" 2>/dev/null || true)
          done

          INTERSECTION=("${RELEASE_ORDER[@]}")
          for dep in "${DEPS[@]}"; do
            pkg=$(cut -d'|' -f1 <<<"$dep")
            releases=" ${SATISFY[$pkg]:-} "
            NEW=()
            for r in "${INTERSECTION[@]}"; do
              [[ "$releases" == *" $r "* ]] && NEW+=("$r")
            done
            INTERSECTION=("${NEW[@]:-}")
          done

          if [ ${#INTERSECTION[@]} -gt 0 ] && [ -n "${INTERSECTION[0]:-}" ]; then
            for r in "${RELEASE_ORDER[@]}"; do
              for cand in "${INTERSECTION[@]}"; do
                if [ "$r" = "$cand" ]; then
                  log "satisfying releases: ${INTERSECTION[*]}"
                  log "picked: $r"
                  echo "$r"
                  exit 0
                fi
              done
            done
          fi

          {
            echo
            echo "ERROR: no single Ubuntu release satisfies all dependencies."
            echo
            echo "Dependencies (extracted from $CONFIGURE_AC):"
            for d in "${DEPS[@]}"; do
              pkg=$(cut -d'|' -f1 <<<"$d"); ver=$(cut -d'|' -f2 <<<"$d"); src=$(cut -d'|' -f3 <<<"$d")
              if [ -n "$ver" ]; then
                printf "  %-30s >= %-10s %s\n" "$pkg" "$ver" "$src"
              else
                printf "  %-30s (any)        %s\n" "$pkg" "$src"
              fi
            done
            echo
            echo "Per-dep release availability:"
            for dep in "${DEPS[@]}"; do
              pkg=$(cut -d'|' -f1 <<<"$dep")
              sat="${SATISFY[$pkg]:-}"
              [ -z "$sat" ] && sat=" (none in candidate set)"
              printf "  %-30s satisfies on:%s\n" "$pkg" "$sat"
            done
            echo
            echo "Image groupings (each covers a disjoint subset):"
            unset GROUPS
            declare -A GROUPS=()
            for dep in "${DEPS[@]}"; do
              pkg=$(cut -d'|' -f1 <<<"$dep")
              sat="${SATISFY[$pkg]:-}"
              [ -z "$sat" ] && continue
              chosen=""
              for r in "${RELEASE_ORDER[@]}"; do
                [[ " $sat " == *" $r "* ]] && { chosen="$r"; break; }
              done
              [ -n "$chosen" ] && GROUPS["$chosen"]+=" $pkg"
            done
            for img in "${!GROUPS[@]}"; do
              printf "  ubuntu:%s → %s\n" "$img" "${GROUPS[$img]}"
            done
            echo
            echo "Resolution paths:"
            echo "  - relax a version constraint in $CONFIGURE_AC"
            echo "  - drop the conflicting dep"
            echo "  - build the conflicting dep from source via project-chain (not yet implemented)"
            echo
            echo "Per slsa-autotools design, mixing apt sources across releases is not supported (ABI safety)."
          } >&2
          exit 1
          PICK_BASE_EOF
          chmod +x /tmp/pick-base.sh
          RELEASE=$(/tmp/pick-base.sh configure.ac)
          echo "release=${RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Picked Ubuntu release: ${RELEASE}"
          # Plumb the discovered -dev packages through to the scan
          # job. Empty file → empty output → install step skips.
          EXTRA_PACKAGES=$(tr '\n' ' ' < /tmp/pick-base-extra-packages.txt | sed 's/ *$//')
          echo "extra_packages=${EXTRA_PACKAGES}" >> "$GITHUB_OUTPUT"
          if [ -n "${EXTRA_PACKAGES}" ]; then
            echo "Project apt deps: ${EXTRA_PACKAGES}"
          else
            echo "Project apt deps: (none)"
          fi

      - name: Resolve image digest for picked release
        id: digest
        # docker pull + inspect is the simplest stable way to turn a
        # tag (ubuntu:resolute) into a digest (sha256:...) without
        # registry-auth gymnastics. Pin via digest in the scan
        # container's image: field below — tag-only would let the
        # image silently drift between resolve and scan.
        run: |
          set -euo pipefail
          docker pull "ubuntu:${{ steps.pick.outputs.release }}" >/dev/null
          DIGEST=$(docker inspect \
            --format='{{index .RepoDigests 0}}' \
            "ubuntu:${{ steps.pick.outputs.release }}" \
            | sed 's/.*@//')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"

  scan:
    name: Trace build and emit pinned Dockerfile
    needs: resolve
    runs-on: ubuntu-24.04
    container:
      image: ubuntu@${{ needs.resolve.outputs.image_digest }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 45
    permissions:
      # Needs to push the emitted Dockerfile back to this branch.
      # The Dockerfile is not a workflow file, so default
      # GITHUB_TOKEN contents:write is sufficient (no PAT / no
      # workflows:write scope needed).
      contents: write
      # Needed to dispatch build-container.yml via workflow_dispatch
      # after committing a new Dockerfile. GitHub does not fire the
      # usual push-triggered workflows for commits made with the
      # default GITHUB_TOKEN (anti-recursion guard), so we have to
      # kick off build-container explicitly.
      actions: write

    env:
      # The snapshot timestamp controls which version of every
      # package enters the Dockerfile. Bump this to pick up
      # security updates or newer toolchain; the emitted
      # Dockerfile's pins will follow.
      SNAPSHOT_TS: ${{ inputs.snapshot_ts != '' && inputs.snapshot_ts || '20260425T120000Z' }}
      # The Ubuntu release codename (resolute / noble / jammy / …)
      # picked by the resolve job from configure.ac dep analysis.
      # Used in the apt sources.list pinning below and threaded into
      # the emitted Dockerfile so build-container.yml builds against
      # the same release.
      RELEASE: ${{ needs.resolve.outputs.release }}
      IMAGE_DIGEST: ${{ needs.resolve.outputs.image_digest }}

    steps:
      - name: Bootstrap git (pre-checkout)
        # Minimal ubuntu:24.04 has no git, which forces
        # actions/checkout into a REST-API fallback with no .git/
        # directory. That would break later git operations used
        # to commit the emitted Dockerfile back.
        shell: sh
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # persist-credentials: true because we push a commit
          # back to the same branch. The token is the ambient
          # GITHUB_TOKEN, not a PAT.
          persist-credentials: true

      - name: Pin apt sources to snapshot.ubuntu.com
        run: |
          set -euo pipefail
          # Bootstrap ca-certificates from the default HTTP archive
          # (snapshot enforces HTTPS). Apt still GPG-verifies the
          # package, so HTTP is only the transport and is one-shot.
          apt-get update -qq
          apt-get install -y --no-install-recommends ca-certificates
          # Swap to the pinned snapshot.
          cat > /etc/apt/sources.list <<APT
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ ${RELEASE} main restricted universe multiverse
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ ${RELEASE}-updates main restricted universe multiverse
          deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ ${RELEASE}-security main restricted universe multiverse
          APT
          rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          # snapshot.ubuntu.com occasionally returns 503 on individual
          # Packages indexes during high traffic. apt-get update exits
          # 0 with a "Failed to fetch" warning when this happens, then
          # the subsequent install step explodes with "Unable to locate"
          # for every package that lived in the missing index. Combine
          # apt's per-fetch Acquire::Retries with an outer shell-level
          # retry that re-runs update if any 'Failed to fetch' warning
          # remains in the log.
          for attempt in 1 2 3 4 5; do
            apt-get -o Acquire::Retries=5 -o Acquire::http::Pipeline-Depth=1 \
                    update 2>&1 | tee /tmp/apt-update.log
            if ! grep -q 'Failed to fetch' /tmp/apt-update.log; then
              break
            fi
            if [ "${attempt}" = "5" ]; then
              echo "ERROR: apt-get update against snapshot.ubuntu.com kept failing across 5 attempts" >&2
              grep '^W:' /tmp/apt-update.log >&2 || true
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Detect Windows build entry point
        # Universal detection, convention- and hook-driven:
        #   - .slsa-autotools/windows-hook.sh   (hook, highest priority)
        #   - windows/build.bash                (xz convention; candidate
        #                                        for becoming a wider
        #                                        default as we see more
        #                                        projects adopt it)
        # When detected, the bootstrap step below also installs the
        # mingw-w64 cross-toolchain + archive tooling, and the trace
        # step below also runs the Windows build so its apt deps land
        # in the emitted Dockerfile naturally.
        id: windows
        run: |
          set -eu
          # Hook-first, then convention. The hook may be +x with its own
          # shebang or a plain .sh; accept both. windows/build.bash is
          # mode 100644 in upstream xz (never chmod'd; invoked as
          # `bash windows/build.bash` by maintainers), so detect by
          # existence rather than executability.
          #
          # Emit ABSOLUTE paths. The trace step below cd's into the
          # distdir before invoking; user hooks at .slsa-autotools/
          # are not in the distdir (make distdir only copies
          # Makefile.am-declared files) so the command must reference
          # the original checkout via ${GITHUB_WORKSPACE}.
          if [ -x .slsa-autotools/windows-hook.sh ]; then
            CMD="${GITHUB_WORKSPACE}/.slsa-autotools/windows-hook.sh"
          elif [ -f .slsa-autotools/windows-hook.sh ]; then
            CMD="bash ${GITHUB_WORKSPACE}/.slsa-autotools/windows-hook.sh"
          elif [ -f windows/build.bash ]; then
            CMD="bash ${GITHUB_WORKSPACE}/windows/build.bash"
          else
            CMD=''
          fi
          if [ -n "${CMD}" ]; then
            echo "detected=true" >> "$GITHUB_OUTPUT"
            echo "cmd=${CMD}"   >> "$GITHUB_OUTPUT"
            echo "Windows build detected: ${CMD}"
          else
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "No Windows build entry point detected."
          fi

      - name: Detect Linux binary build entry point
        # Hook-only — no convention path for AppImage. Multiple AppImage
        # builders exist (linuxdeploy, appimagetool, appimage-builder,
        # electron-builder) and projects pick whichever fits; the hook
        # is the project's adapter. Same shape as windows-hook.sh.
        # When detected, the bootstrap toolchain installs the universal
        # AppImage build deps (squashfs-tools, patchelf, desktop-file-
        # utils) and the trace step runs the linux build so any
        # additional apt deps the hook touches land in the emitted
        # Dockerfile.
        id: linux
        run: |
          set -eu
          if [ -x .slsa-autotools/linux-hook.sh ]; then
            CMD="${GITHUB_WORKSPACE}/.slsa-autotools/linux-hook.sh"
          elif [ -f .slsa-autotools/linux-hook.sh ]; then
            CMD="bash ${GITHUB_WORKSPACE}/.slsa-autotools/linux-hook.sh"
          else
            CMD=''
          fi
          if [ -n "${CMD}" ]; then
            echo "detected=true" >> "$GITHUB_OUTPUT"
            echo "cmd=${CMD}"   >> "$GITHUB_OUTPUT"
            echo "Linux binary build detected: ${CMD}"
          else
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "No Linux binary build entry point detected."
          fi

      - name: Install bootstrap toolchain
        # A deliberately generous set of packages so most autotools
        # projects can actually run ./configure && make dist to
        # completion. Anything unused by the target project simply
        # doesn't show up in the strace output and won't land in
        # the emitted Dockerfile.
        run: |
          set -euo pipefail
          apt-get install -y --no-install-recommends \
            build-essential \
            autoconf \
            automake \
            libtool \
            autopoint \
            gettext \
            po4a \
            m4 \
            pkg-config \
            strace \
            dpkg-dev \
            git \
            ca-certificates \
            curl \
            file \
            xz-utils \
            gzip \
            bzip2 \
            lzip \
            zip \
            zstd \
            tar \
            groff \
            bsdextrautils \
            texinfo \
            help2man \
            fig2dev \
            bison \
            gperf \
            wget \
            cpio \
            libc6-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libssl-dev \
            libffi-dev \
            libicu-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            libsqlite3-dev
          # Conditional: mingw cross-toolchain + archive tooling, only
          # when a Windows build path is present. Keeps the emitted
          # Dockerfile minimal for projects that don't ship Windows
          # binaries. ghostscript is included because xz's build.bash
          # uses it to produce PDF manuals; harmless if not invoked.
          if [ "${{ steps.windows.outputs.detected }}" = 'true' ]; then
            apt-get install -y --no-install-recommends \
              mingw-w64 \
              gcc-mingw-w64-i686 \
              gcc-mingw-w64-x86-64 \
              binutils-mingw-w64-i686 \
              binutils-mingw-w64-x86-64 \
              7zip \
              ghostscript
          fi
          # Conditional: AppImage build deps, only when a Linux binary
          # path is present. squashfs-tools provides mksquashfs (the
          # AppImage payload format); patchelf is universal RPATH /
          # interpreter rewriting used by every AppImage builder;
          # desktop-file-utils validates the .desktop file every
          # AppImage embeds. The specific AppImage builder
          # (linuxdeploy, appimagetool, appimage-builder, …) is the
          # project's choice — its linux-hook.sh downloads it by SHA
          # at release time, mirroring how cosign is installed.
          if [ "${{ steps.linux.outputs.detected }}" = 'true' ]; then
            apt-get install -y --no-install-recommends \
              squashfs-tools \
              patchelf \
              desktop-file-utils
          fi
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Install project apt deps (resolver-discovered)
        # The resolve job parsed configure.ac for AM_PATH_<NAME> and
        # PKG_CHECK_MODULES, and apt-file mapped each to its -dev
        # package. Install them here so configure can find them; the
        # subsequent strace will capture the actual file opens and
        # pin them in the emitted Dockerfile. Skip cleanly when
        # there are no resolver-discovered deps (most projects).
        if: needs.resolve.outputs.extra_packages != ''
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          apt-get install -y --no-install-recommends ${{ needs.resolve.outputs.extra_packages }}

      - name: Run project build under strace
        id: trace
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          mkdir -p /tmp/scan

          # Bootstrap sequence. Priority:
          #   1. Project-provided .slsa-autotools/build-hook.sh — runs
          #      in place of the autogen/bootstrap step only; the
          #      configure + make dist tail still runs after, matching
          #      release.yml's "build-hook is bootstrap-only" contract.
          #   2. ./autogen.sh or ./bootstrap if present. The || form
          #      runs autoreconf -fi only when autogen exits non-zero
          #      — covers libpng (autogen mode=configure refuses,
          #      exits 1) and libsodium (autogen exits with getopt
          #      usage), without redundantly running autoreconf when
          #      autogen succeeded. The redundant run was harmful for
          #      the GnuPG family: autoreconf invokes automake
          #      --add-missing --copy which overwrites the project's
          #      vendored po/Makefile.in.in with automake's bundled
          #      (older) version, breaking gettext infrastructure
          #      version match against the project's m4/po.m4 macros.
          #      Trace coverage of autotools binaries is preserved:
          #      either autogen runs them (exit 0 path) or autoreconf
          #      does (exit non-zero path). One side of the || always
          #      fires and feeds the strace.
          #   3. Plain autoreconf -fi against configure.ac.
          #
          # FORCE_UNSAFE_CONFIGURE=1: coreutils' configure refuses to
          # run as root unless this is set. Container jobs run as root
          # by default. Other projects ignore the variable, so setting
          # it universally is zero-cost noise rather than a per-project
          # hook.
          DIST_TAIL='FORCE_UNSAFE_CONFIGURE=1 ./configure --quiet && make -s dist GITLOG_TO_CHANGELOG=true'
          if [ -x .slsa-autotools/build-hook.sh ]; then
            BUILD_CMD="./.slsa-autotools/build-hook.sh && ${DIST_TAIL}"
          elif [ -x autogen.sh ]; then
            BUILD_CMD="./autogen.sh || autoreconf -fi; ${DIST_TAIL}"
          elif [ -x bootstrap ]; then
            BUILD_CMD="./bootstrap || autoreconf -fi; ${DIST_TAIL}"
          elif [ -f configure.ac ] || [ -f configure.in ]; then
            BUILD_CMD="autoreconf -fi && ${DIST_TAIL}"
          else
            echo "ERROR: no recognizable autotools bootstrap found."
            echo "Expected one of: .slsa-autotools/build-hook.sh, autogen.sh,"
            echo "                 bootstrap, configure.ac, configure.in"
            exit 1
          fi
          echo "Bootstrap command: ${BUILD_CMD}"

          # Trace. -f follows forks (autotools spawns many), the
          # openat + execve filter is enough to capture every file
          # the build reads and every binary it runs. read/write
          # are excluded — reads happen on already-opened fds and
          # add noise.
          #
          # make dist (not make distdir) runs the full tarball
          # pipeline, so tar/gzip/xz-utils show up in the trace
          # and get pinned in the emitted Dockerfile. distdir
          # alone would miss those.
          strace -f -e trace=openat,execve -o /tmp/scan/trace.log \
                 bash -c "${BUILD_CMD}" \
            || { echo "Build under strace FAILED."; \
                 tail -100 /tmp/scan/trace.log || true; \
                 exit 1; }

          # Windows build, if detected. Traced into a separate file
          # and concatenated onto the primary log so the downstream
          # path→package mapping picks up mingw/7zip/ghostscript
          # transparently — no second codepath below.
          #
          # Windows build scripts (xz's windows/build.bash, and any
          # hook users write by analogy) expect to run from inside a
          # populated distdir — the primary BUILD_CMD ran `make dist`
          # which produces the tarball and removes the distdir after,
          # so regenerate a fresh distdir and chdir into it before
          # invoking the windows command. Mirrors what release.yml's
          # build_windows job does.
          WINDOWS_CMD='${{ steps.windows.outputs.cmd }}'
          if [ -n "${WINDOWS_CMD}" ]; then
            echo "Regenerating distdir for Windows trace..."
            make -s distdir
            PACKAGE=$(awk -F' *= *' '$1 == "PACKAGE" {print $2; exit}' Makefile)
            VERSION=$(awk -F' *= *' '$1 == "VERSION" {print $2; exit}' Makefile)
            DISTDIR="${PACKAGE}-${VERSION}"
            [ -d "${DISTDIR}" ] || { echo "ERROR: distdir ${DISTDIR} not found for windows trace"; ls -la; exit 1; }
            echo "Tracing Windows build from ${DISTDIR}: ${WINDOWS_CMD}"
            strace -f -e trace=openat,execve -o /tmp/scan/trace-windows.log \
                   bash -c "cd '${DISTDIR}' && ${WINDOWS_CMD}" \
              || { echo "Windows build under strace FAILED."; \
                   tail -100 /tmp/scan/trace-windows.log || true; \
                   exit 1; }
            cat /tmp/scan/trace-windows.log >> /tmp/scan/trace.log
            echo "Windows trace appended: $(wc -l < /tmp/scan/trace-windows.log) lines"
          fi

          # Linux binary build, if detected. Same trace-and-append
          # pattern as Windows above. The hook downloads its preferred
          # AppImage builder by SHA at build time; squashfs-tools and
          # patchelf were installed by the toolchain step. Whatever
          # additional apt-installed binaries the hook touches land
          # in the trace and pin into the emitted Dockerfile naturally.
          LINUX_CMD='${{ steps.linux.outputs.cmd }}'
          if [ -n "${LINUX_CMD}" ]; then
            echo "Regenerating distdir for Linux trace..."
            make -s distdir
            PACKAGE=$(awk -F' *= *' '$1 == "PACKAGE" {print $2; exit}' Makefile)
            VERSION=$(awk -F' *= *' '$1 == "VERSION" {print $2; exit}' Makefile)
            DISTDIR="${PACKAGE}-${VERSION}"
            [ -d "${DISTDIR}" ] || { echo "ERROR: distdir ${DISTDIR} not found for linux trace"; ls -la; exit 1; }
            echo "Tracing Linux binary build from ${DISTDIR}: ${LINUX_CMD}"
            strace -f -e trace=openat,execve -o /tmp/scan/trace-linux.log \
                   bash -c "cd '${DISTDIR}' && ${LINUX_CMD}" \
              || { echo "Linux binary build under strace FAILED."; \
                   tail -100 /tmp/scan/trace-linux.log || true; \
                   exit 1; }
            cat /tmp/scan/trace-linux.log >> /tmp/scan/trace.log
            echo "Linux trace appended: $(wc -l < /tmp/scan/trace-linux.log) lines"
          fi

          echo "trace_lines=$(wc -l < /tmp/scan/trace.log)" >> "$GITHUB_OUTPUT"
          echo "Trace captured: $(wc -l < /tmp/scan/trace.log) lines"

      - name: Extract absolute paths from trace
        run: |
          set -euo pipefail
          # Two extraction rules:
          #   - execve("...", ...) -> the binary being executed
          #   - openat(AT_FDCWD|..., "...", ...) -> files opened
          #
          # Filter to paths that start with / and survive the
          # interned-paths exclusion list below.
          awk '
            /execve\("/  { match($0, /execve\("[^"]+"/);
                           if (RSTART>0) {
                             p = substr($0, RSTART+8, RLENGTH-9); print p
                           } }
            /openat\(/   { match($0, /"[^"]+"/);
                           if (RSTART>0) {
                             p = substr($0, RSTART+1, RLENGTH-2);
                             if (substr(p,1,1) == "/") print p
                           } }
          ' /tmp/scan/trace.log \
            | sort -u \
            > /tmp/scan/paths.raw.txt

          # Exclude paths that can't be in an apt package or would
          # waste dpkg -S lookups. The `|| true` on each grep
          # guards against exit 1 when a filter matches every line
          # (pipefail-safe; grep's "no match" signal isn't useful
          # here).
          { grep -vE '^(/tmp/|/proc/|/dev/|/sys/|/run/|/home/|/root/|/var/|/__w/|/github/|\.)' \
              /tmp/scan/paths.raw.txt || true; } \
            | { grep -vE "^${GITHUB_WORKSPACE}" || true; } \
            | sort -u \
            > /tmp/scan/paths.txt

          echo "Raw paths: $(wc -l < /tmp/scan/paths.raw.txt)"
          echo "Filtered:  $(wc -l < /tmp/scan/paths.txt)"

      - name: Map paths to apt packages
        run: |
          set -euo pipefail
          # dpkg -S takes a path and prints "pkg[,pkg]: /path".
          # Many traced paths won't belong to any package (ld.so
          # cache, kernel interfaces, compiler-generated temporaries,
          # etc.) — dpkg exits 1 for those, which propagates through
          # xargs as exit code 123 and, under pipefail, kills the
          # step. That's the normal case, not an error. The command
          # group below swallows xargs's non-zero exit so the
          # pipeline only fails if a later stage fails.
          { xargs -a /tmp/scan/paths.txt -L 100 dpkg -S 2>/dev/null || true; } \
            | awk -F: '{print $1}' \
            | tr ',' '\n' \
            | sed 's/^ *//;s/ *$//' \
            | { grep -v '^$' || true; } \
            | sort -u \
            > /tmp/scan/direct-packages.txt

          # Strip any architecture suffix (pkg:amd64 -> pkg).
          sed -i 's/:.*$//' /tmp/scan/direct-packages.txt

          # Always-required packages, regardless of what the trace
          # happened to touch:
          #   - git: the emitted Dockerfile ends with a
          #     `git config --global --add safe.directory '*'`
          #     step, and release.yml's jobs invoke git directly
          #     (git log, git rebase, etc.). Projects whose make
          #     dist doesn't invoke git (libsodium) would otherwise
          #     produce an image without git and fail at image
          #     build time.
          echo 'git' >> /tmp/scan/direct-packages.txt

          sort -u -o /tmp/scan/direct-packages.txt /tmp/scan/direct-packages.txt

          if [ ! -s /tmp/scan/direct-packages.txt ]; then
            echo "ERROR: zero packages mapped from $(wc -l < /tmp/scan/paths.txt) paths."
            exit 1
          fi

          echo "Direct packages (from trace + always-required): $(wc -l < /tmp/scan/direct-packages.txt)"

          # Expand to the full transitive dependency closure. Our
          # trace only captures files the build actually opens, but
          # the produced Dockerfile installs the pinned .deb set via
          # apt-get install ./*.deb, which still requires every
          # transitive Depends and Pre-Depends to be present in the
          # local set (apt resolves install order but won't pull
          # extra packages from the network — we deleted the apt
          # sources after pinning). Runtime libs loaded via ld-linux often
          # don't appear in strace (libisl, libmpfr, libmpc for
          # cpp-13; binutils-common for binutils; etc.) — apt knows
          # about them because they're declared in control files.
          #
          # apt-cache depends --recurse expands to the closure using
          # the Packages index alone; the --no-* flags strip
          # relationship types we don't need to install.
          apt-cache depends --recurse \
              --no-recommends --no-suggests \
              --no-conflicts --no-breaks \
              --no-replaces --no-enhances \
              $(cat /tmp/scan/direct-packages.txt) \
            | grep -E '^\S' \
            | sort -u \
            > /tmp/scan/packages.txt

          echo "Full transitive closure: $(wc -l < /tmp/scan/packages.txt)"
          echo "Added by recursion:"
          comm -23 /tmp/scan/packages.txt /tmp/scan/direct-packages.txt

      - name: Resolve versions and SHA256s from snapshot
        run: |
          set -euo pipefail
          # apt-cache dumpavail emits every available package's full
          # control record in RFC822 format, including Version,
          # SHA256, and Filename. It reads apt's caches directly
          # and doesn't care how the Packages index was stored on
          # disk (plain, .gz, .xz, .lz4 — apt handles all of them
          # internally). That's more robust than trying to detect
          # and decompress every format ourselves.
          apt-cache dumpavail > /tmp/scan/all-packages.idx
          if [ ! -s /tmp/scan/all-packages.idx ]; then
            echo "ERROR: apt-cache dumpavail produced no output"
            ls -la /var/lib/apt/lists/ || true
            exit 1
          fi
          echo "Combined index size: $(wc -l < /tmp/scan/all-packages.idx) lines"

          : > /tmp/scan/pins.txt
          while read -r pkg; do
            [ -z "${pkg}" ] && continue
            # Installed version is our selector.
            ver=$(dpkg-query -W -f='${Version}' "${pkg}" 2>/dev/null || true)
            if [ -z "${ver}" ]; then
              echo "skip: ${pkg} not installed (false positive from dpkg -S?)"
              continue
            fi
            # Find the matching Package+Version paragraph in the
            # snapshot index and extract SHA256 + Filename (the
            # relative path under dists/.../ that serves the .deb).
            read -r sha filename <<<"$(
              awk -v p="${pkg}" -v v="${ver}" '
                BEGIN { RS=""; FS="\n" }
                {
                  name=""; version=""; sha=""; file=""
                  for (i=1;i<=NF;i++) {
                    line=$i
                    if      (substr(line,1,9)=="Package: ")  name=substr(line,10)
                    else if (substr(line,1,9)=="Version: ")  version=substr(line,10)
                    else if (substr(line,1,8)=="SHA256: ")   sha=substr(line,9)
                    else if (substr(line,1,10)=="Filename: ") file=substr(line,11)
                  }
                  if (name==p && version==v && sha!="") {
                    print sha, file
                    exit
                  }
                }' /tmp/scan/all-packages.idx
            )"
            if [ -z "${sha}" ] || [ -z "${filename}" ]; then
              echo "WARN: no SHA256/Filename for ${pkg}=${ver} in snapshot index; skipping"
              continue
            fi
            printf '%s\t%s\t%s\t%s\n' "${pkg}" "${ver}" "${sha}" "${filename}" >> /tmp/scan/pins.txt
          done < /tmp/scan/packages.txt

          echo "Resolved pins: $(wc -l < /tmp/scan/pins.txt)"
          echo "First 5 lines:"
          head -5 /tmp/scan/pins.txt || true

      - name: Emit Dockerfile
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"

          # Compose the Dockerfile with inlined version pins and
          # SHA256 checks. Every apt byte that ends up in the
          # resulting image is verified against the snapshot's
          # signed Packages index at build time. The snapshot
          # timestamp is embedded so the image is re-derivable
          # indefinitely from this file alone.

          {
            echo "# Generated by slsa-autotools scan.yml"
            echo "# {{GENERATOR_URL}} @ {{GENERATOR_SHA}}"
            echo "#"
            echo "# Every apt package below is pinned to both an exact version"
            echo "# and the SHA256 of its .deb as served by"
            echo "# snapshot.ubuntu.com at ${SNAPSHOT_TS}. Any drift in the"
            echo "# served bytes will fail the sha256sum check at image build."
            echo "#"
            echo "# This file is regenerated by scan.yml whenever it is run."
            echo "# Hand edits are preserved through the next run only if you"
            echo "# re-run scan.yml yourself; otherwise a fresh run will"
            echo "# overwrite. Editing individual SHA256 values is safe — the"
            echo "# verification step is purely local to this file."
            echo ""
            echo "FROM ubuntu@${IMAGE_DIGEST}"
            echo ""
            echo "ENV DEBIAN_FRONTEND=noninteractive"
            echo ""
            echo "# Step 1: bootstrap ca-certificates from the default HTTP"
            echo "# archive so we can reach snapshot.ubuntu.com over HTTPS."
            echo "RUN apt-get update -qq \\"
            echo " && apt-get install -y --no-install-recommends ca-certificates"
            echo ""
            echo "# Step 2: redirect apt to the pinned snapshot. All later"
            echo "# apt traffic is immutable indefinitely."
            echo "RUN set -eu \\"
            echo " && printf '%s\\n' \\"
            echo "    'deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ ${RELEASE} main restricted universe multiverse' \\"
            echo "    'deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ ${RELEASE}-updates main restricted universe multiverse' \\"
            echo "    'deb https://snapshot.ubuntu.com/ubuntu/${SNAPSHOT_TS}/ ${RELEASE}-security main restricted universe multiverse' \\"
            echo "    > /etc/apt/sources.list \\"
            echo " && rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list \\"
            echo " && apt-get update -qq"
            echo ""
            echo "# Step 3: download each pinned .deb, verify its SHA256,"
            echo "# then install. A single RUN so failure aborts the layer"
            echo "# atomically. Packages are deduplicated and sorted."
            echo "RUN set -eux \\"
            echo " && mkdir -p /tmp/debs && cd /tmp/debs \\"
            echo " && apt-get download \\"

            # Emit "pkg=version \" lines with trailing backslash.
            # Sorted by package name for a deterministic Dockerfile
            # byte stream.
            sort -k1,1 /tmp/scan/pins.txt \
              | awk -F'\t' '{ printf "      %s=%s \\\n", $1, $2 }'

            # printf instead of a heredoc, because heredocs inside
            # a backslash-chained RUN do not terminate correctly on
            # the continuation line. Each SHA256 line is a quoted
            # argument to printf.
            echo " && printf '%s\\n' \\"

            # Filename reconstruction. Two conventions in play:
            #   - The Packages index Filename field stores the
            #     *pool* path, with epoch stripped:
            #       pool/main/a/automake/automake_1.16.5-1.3ubuntu1_all.deb
            #   - apt-get download writes to disk with the full
            #     epoch URL-encoded as %3a:
            #       automake_1%3a1.16.5-1.3ubuntu1_all.deb
            # Our SHA256SUMS must match the on-disk name, which is
            # apt's convention. The hash is content-addressed so
            # it's identical between the two naming schemes — we
            # just have to use the right name in the -c file.
            awk -F'\t' '
              {
                pkg = $1; ver = $2; sha = $3; filename = $4
                n = split(filename, parts, "/")
                pool_deb = parts[n]
                # Extract architecture from the pool basename:
                # "automake_1.16.5-1.3ubuntu1_all.deb" -> "all"
                m = split(pool_deb, fields, "_")
                arch = fields[m]
                sub(/\.deb$/, "", arch)
                # URL-encode colons in the version segment
                gsub(/:/, "%3a", ver)
                apt_name = pkg "_" ver "_" arch ".deb"
                printf "      %c%s  %s%c \\\n", 39, sha, apt_name, 39
              }' /tmp/scan/pins.txt | sort -k3,3

            echo "    > SHA256SUMS \\"
            echo " && sha256sum -c SHA256SUMS \\"
            echo " && apt-get install -y --no-install-recommends ./*.deb \\"
            echo " && cd / && rm -rf /tmp/debs \\"
            echo " && apt-get clean \\"
            echo " && rm -rf /var/lib/apt/lists/*"
            echo ""
            echo "# Re-register the workspace as a safe git directory for"
            echo "# the container user. Needed for any later git operation"
            echo "# this image's consumers may want to do."
            echo "RUN git config --global --add safe.directory '*'"
          } > Dockerfile.new

          echo "Dockerfile draft size: $(wc -l < Dockerfile.new) lines"
          head -40 Dockerfile.new

      - name: Commit Dockerfile if changed
        id: commit
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          if [ -f Dockerfile ] && cmp -s Dockerfile Dockerfile.new; then
            echo "Dockerfile is unchanged — nothing to commit."
            rm -f Dockerfile.new
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mv Dockerfile.new Dockerfile

          # GitHub Actions sets the committer from the token
          # principal (github-actions[bot]) but leaves the author
          # blank. Set both explicitly so the commit reads clean.
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add Dockerfile

          if git diff --cached --quiet; then
            echo "No diff after staging — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Body lines kept under 72 chars per project commit-msg
          # hooks (libgpg-error's build-aux/git-hooks/commit-msg
          # rejects longer lines once installed by autogen.sh).
          git commit \
            -m 'Regenerate Dockerfile via slsa-autotools scan' \
            -m "Pinned to snapshot.ubuntu.com at ${SNAPSHOT_TS}." \
            -m 'Every package pinned by version and SHA256.'
          # Fully qualified target ref — actions/checkout always
          # detaches HEAD, so a bare `git push origin HEAD` has no
          # branch name to map to on the remote.
          #
          # Race-tolerant push: another commit may have landed on the
          # target branch while we were tracing (e.g. a concurrent PR
          # merge). Refresh the remote ref, rebase our single
          # Dockerfile commit on top if needed, then push. Retry up to
          # three times in case the race recurs mid-rebase.
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git merge-base --is-ancestor "origin/${GITHUB_REF_NAME}" HEAD; then
              echo "Remote ${GITHUB_REF_NAME} advanced (attempt ${attempt}); rebasing."
              git rebase "origin/${GITHUB_REF_NAME}" \
                || { echo "Rebase conflict — another commit touched Dockerfile. Aborting."; exit 1; }
            fi
            if git push origin "HEAD:${GITHUB_REF}"; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "Push still rejected after 3 attempts; aborting."
              exit 1
            fi
            echo "Push rejected (attempt ${attempt}); another push beat us. Retrying."
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch build-container workflow
        # Explicit workflow_dispatch because the commit above was
        # made with the default GITHUB_TOKEN, which does not fire
        # the usual push-triggered workflows (GitHub's anti-
        # recursion guard). Only dispatched if the Dockerfile
        # actually changed.
        #
        # Non-fatal: on first-time adoption the dispatch returns 404
        # because build-container.yml isn't yet on the default
        # branch (GitHub's workflow_dispatch requires the workflow
        # to exist on the default branch). In that case the PR merge
        # itself will fire build-container via its push trigger on
        # master, so the dispatch miss is harmless. Log and move on.
        #
        # Uses curl rather than gh because the scan container's
        # bootstrap toolchain does not include gh (avoiding the
        # extra install keeps the image minimal for the trace).
        # Same underlying endpoint either way.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          http=$(curl -sS -o /tmp/dispatch.out -w '%{http_code}' -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/build-container.yml/dispatches" \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\"}")
          case "${http}" in
            204)
              echo "Dispatched build-container.yml on ${GITHUB_REF_NAME}"
              ;;
            404)
              echo "Dispatch 404 — build-container.yml is likely not yet on the default branch."
              echo "First-time adoption: the PR merge will fire build-container via push trigger. Continuing."
              ;;
            *)
              echo "Unexpected HTTP ${http} from dispatch:"
              cat /tmp/dispatch.out || true
              exit 1
              ;;
          esac
